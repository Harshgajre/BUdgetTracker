<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Edit Transaction - The Precision Editorial</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>

        theme: {
          extend: {

              "surface-variant": "#e3e1ea",
              "on-error-container": "#93000a",
              "on-tertiary-fixed-variant": "#733500",
              "on-tertiary": "#ffffff",
              "on-background": "#1b1b21",

              "surface-dim": "#dbd9e2",

              "on-primary-fixed-variant": "#2c3c9e",
              "tertiary-container": "#863f00",
              "secondary-fixed-dim": "#7ad7c6",

              "tertiary-fixed-dim": "#ffb689",
              "outline": "#767684",

              "surface": "#fbf8ff",

              "surface-container-high": "#e9e7f0",

              "on-secondary": "#ffffff",
              "outline-variant": "#c6c5d4",
              "error": "#ba1a1a",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #1e3093 0%, #3949ab 100%);
        }
        .glass-effect {
            backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- TopAppBar (Supressed Shell Navigation as it is a focused Task Page) -->
<header class="flex justify-between items-center w-full px-6 h-16 bg-[#fbf8ff] sticky top-0 z-50">
<div class="flex items-center gap-4">
<button class="hover:bg-[#f5f2fb] transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined text-[#1e3093]">close</span>
</button>
<h1 class="font-headline font-bold text-lg tracking-tight text-[#1e3093]">Edit Transaction</h1>
</div>
<button class="hover:bg-[#f5f2fb] transition-colors p-2 rounded-full active:scale-95 duration-150">
<span class="material-symbols-outlined text-[#1e3093]">more_vert</span>
</button>
</header>
<main class="max-w-md mx-auto px-6 pt-8 pb-32">
<!-- Hero Amount Section -->
<section class="mb-12 text-center">
<p class="font-label text-xs font-medium uppercase tracking-widest text-on-surface-variant mb-2">Total Amount</p>
<div class="flex items-center justify-center gap-1">
<span class="font-headline text-2xl font-bold text-surface-tint">$</span>
<input class="w-full max-w-[200px] text-center bg-transparent border-none focus:ring-0 font-headline text-[3.5rem] font-extrabold text-on-surface p-0 leading-none" type="text" value="45.00"/>
</div>
</section>
<!-- Editorial Transaction Details -->
<div class="space-y-6">
<!-- Category & Date Group (Organic Asymmetry) -->
<div class="grid grid-cols-5 gap-3">
<div class="col-span-3 bg-surface-container-low p-5 rounded-xl">
<label class="block font-label text-[0.75rem] font-medium text-on-surface-variant mb-3">Category</label>
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-secondary-container flex items-center justify-center text-on-secondary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">restaurant</span>
</div>
<span class="font-headline font-bold text-on-surface">Food</span>
</div>
</div>
<div class="col-span-2 bg-surface-container-high p-5 rounded-xl flex flex-col justify-between">
<label class="block font-label text-[0.75rem] font-medium text-on-surface-variant">Date</label>
<div class="font-headline font-bold text-on-surface mt-auto">Nov 15</div>
</div>
</div>
<!-- Description Field -->
<div class="bg-surface-container-lowest border border-outline-variant/15 p-6 rounded-xl shadow-[0_8px_24px_rgba(27,27,33,0.04)]">
<label class="block font-label text-[0.75rem] font-medium text-on-surface-variant mb-4">Note &amp; Description</label>
<textarea class="w-full bg-transparent border-none focus:ring-0 font-body text-on-surface p-0 resize-none h-24" placeholder="Add details about this transaction...">Lunch with friends</textarea>
</div>
<!-- Location Meta -->
<div class="bg-surface-container-low p-4 rounded-xl flex items-center justify-between">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-outline">location_on</span>
<span class="font-body text-sm text-on-surface">Central Park Cafe</span>
</div>
<span class="material-symbols-outlined text-outline-variant text-sm">chevron_right</span>
</div>
<!-- Receipt/Image Section (Bento Style) -->
<div class="relative group cursor-pointer overflow-hidden rounded-xl h-48 bg-surface-container-highest">
<img alt="Transaction receipt image" class="w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform duration-500" data-alt="Digital photo of a restaurant receipt on table" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBRRzaFnf3xGmzSlMvtBUGKAZEMoSX8VBBAKwtMNfTB3RKej6Ch2U7RKfAH54pYF_KfYelBJw4JvurSfi2b7JCxfc03nxLY3YXtdCV4CW4uoohv7-FLgXxkvA7uMLHf6-9HW-CETQoyd6uUoR6Qbgd13qbKTmxJaomTR61wnr6s-GmCBQjXc36WGUQFEaVczPtrk6hqNF9uvxMH5nYv7H-bMEymfrvbvqKm3Cc-SUMsT-HSTfdsQJEozxe4FTS3jqU-b-HPCPsI2_E"/>
<div class="absolute inset-0 flex flex-col items-center justify-center bg-background/20 backdrop-blur-sm">
<span class="material-symbols-outlined text-[#1e3093] mb-2">image</span>
<span class="font-label text-xs font-bold text-[#1e3093]">VIEW ATTACHMENT</span>
</div>
</div>
</div>
<!-- Action Buttons Section -->
<div class="mt-12 space-y-4">
<button class="w-full signature-gradient text-on-primary py-5 rounded-full font-headline font-extrabold tracking-tight shadow-lg active:scale-95 transition-all">
                Save Changes
            </button>
<button class="w-full flex items-center justify-center gap-2 bg-transparent text-error py-4 rounded-full font-body font-semibold active:scale-95 transition-all">
<span class="material-symbols-outlined text-lg">delete</span>
                Delete Transaction
            </button>
</div>
</main>
<!-- Navigation Shell Suppressed for focused Task Intent -->
</body></html>
